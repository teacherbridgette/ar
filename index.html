<!DOCTYPE html>
<html>
  <head>
    <title>Classroom AR: Car Experience</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
      /* Style for the interactive play button overlay */
      .action-btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        padding: 15px 30px;
        background-color: #2196F3;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        font-family: sans-serif;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <button class="action-btn" id="playButton">Tap to Start Engine 🚗</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <video id="carVideo" src="./car.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        <audio id="carSound" src="./car_sound.mp3" crossorigin="anonymous"></audio>
        <img id="speakerIcon" src="https://img.icons8.com/ios-filled/100/ffffff/speaker.png" crossorigin="anonymous">
      </a-assets>
      
      <a-marker preset="hiro">
        
        <a-plane position="0 0.2 0" 
                 rotation="-90 0 0" 
                 width="2" 
                 height="1.5"
                 material="shader: chromakey; src: #carVideo; color: 0.1 0.9 0.1; distance: 0.4">
        </a-plane>

        <a-text value="a car" 
                position="0 1.5 -0.5" 
                align="center" 
                color="#FFFFFF" 
                width="6"
                geometry="primitive: plane; width: 1.5; height: 0.4" 
                material="color: #333333; opacity: 0.8">
        </a-text>

        <a-image src="#speakerIcon" 
                 position="0 0.3 0.9" 
                 rotation="-90 0 0" 
                 width="0.3" 
                 height="0.3"
                 sound="src: #carSound; autoplay: false; loop: true; volume: 1;">
        </a-image>
        
      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>

    <script>
      const btn = document.getElementById('playButton');
      const video = document.getElementById('carVideo');
      const soundEl = document.querySelector('[sound]');

      // Pre-load video states on page startup
      window.addEventListener('load', () => {
        video.load();
      });

      btn.addEventListener('click', () => {
        // 1. Try to play the video normally
        video.play().then(() => {
          console.log("Video playing successfully");
        }).catch((error) => {
          console.log("Normal playback blocked. Running fail-safe muted video player...", error);
          // Fail-safe: Browsers never block muted videos. Since sound comes from the MP3 anyway, this works perfectly.
          video.muted = true;
          video.play();
        });
        
        // 2. Play the separate MP3 sound from the speaker element
        if (soundEl && soundEl.components.sound) {
          soundEl.components.sound.playSound();
        }
        
        // 3. Hide the start button so it doesn't block the screen
        btn.style.display = 'none';
      });
    </script>
  </body>
</html>
