<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Toy Vocabulary Portrait AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #000;
      }

      #arjs-video {
        position: absolute !important;
        top: 0 !important; left: 0 !important;
        width: 100% !important; height: 100% !important;
        object-fit: cover !important;
        z-index: 1 !important;
      }

      #splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #2b3a42; color: white;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 99999; text-align: center; padding: 20px; box-sizing: border-box;
      }
      
      .action-btn {
        padding: 16px 36px; font-size: 22px; font-weight: bold;
        background-color: #ff5722; border: none; color: white;
        border-radius: 16px; cursor: pointer; margin-top: 20px;
        box-shadow: 0px 6px 0px #b33611;
      }

      /* Fullscreen Native UI Layer */
      #uiOverlay {
        display: none; 
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 9999 !important;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        background: rgba(43, 58, 66, 0.85); 
        padding: calc(env(safe-area-inset-top) + 30px) 20px calc(env(safe-area-inset-bottom) + 40px) 20px;
        box-sizing: border-box;
      }

      .vocabulary-row { display: flex; align-items: center; justify-content: center; gap: 20px; }
      .vocabulary-text { font-size: 3.5rem; font-weight: 900; color: #FFEB3B; margin: 0; text-shadow: 0px 4px 8px rgba(0,0,0,0.6); }
      
      .speaker-icon-btn { 
        background: #fff; border: none; border-radius: 50%; 
        width: 70px; height: 70px; font-size: 36px; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; 
        box-shadow: 0px 4px 12px rgba(0,0,0,0.4); 
      }

      .video-box-container { 
        width: 85%; max-width: 320px; aspect-ratio: 1 / 1; 
        background: #111; border: 6px solid #fff; border-radius: 28px; 
        overflow: hidden; box-shadow: 0px 16px 36px rgba(0,0,0,0.6); 
        display: flex; align-items: center; justify-content: center; position: relative; 
      }

      /* CRITICAL FIX: The video element defaults to block with opacity 0 to warm up device pipeline */
      #carVideoElement { 
        width: 100% !important; 
        height: 100% !important; 
        object-fit: cover !important; 
        display: block;
        opacity: 0;
      }

      #videoPlayOverlayBtn { 
        position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.5); 
        border: none; color: white; font-size: 65px; cursor: pointer; 
        display: flex; align-items: center; justify-content: center; z-index: 10;
      }
    </style>

    <script>
      let audioAsset = null;
      let videoAsset = null;

      function startARClass() {
        document.getElementById('splash').style.display = 'none';

        audioAsset = document.getElementById('carAudioElement');
        videoAsset = document.getElementById('carVideoElement');
        
        if (audioAsset) audioAsset.load();
        
        // Forced iOS Hardware Bypass: Kick off video decoder immediately on first click!
        if (videoAsset) {
          videoAsset.load();
          videoAsset.muted = true;
          videoAsset.play().then(() => {
            videoAsset.pause();
          }).catch(e => console.log("Video warmup rejected:", e));
        }

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).catch(e => console.log(e));
        }
        
        if ('speechSynthesis' in window) {
          window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
        }
      }

      AFRAME.registerComponent('marker-handler', {
        init: function () {
          this.el.addEventListener('markerFound', () => {
            document.getElementById('uiOverlay').style.display = 'flex';
          });

          this.el.addEventListener('markerLost', () => {
            document.getElementById('uiOverlay').style.display = 'none';
            if (videoAsset) {
              videoAsset.pause();
              videoAsset.style.opacity = "0";
              document.getElementById('videoPlayOverlayBtn').style.display = 'flex';
            }
            if (audioAsset) {
              audioAsset.pause();
            }
          });
        }
      });

      // Action: Force Video Frames Onto iOS Screen
      function triggerVideoPlayback() {
        if (videoAsset) {
          document.getElementById('videoPlayOverlayBtn').style.display = 'none';
          videoAsset.style.opacity = "1"; // Reveal the video tracks visually
          videoAsset.currentTime = 0;
          videoAsset.muted = true; // iOS demands inline looping web videos stay muted to render
          
          let playPromise = videoAsset.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => {
              // Forced fallback loop execution if engine stutters
              videoAsset.muted = true;
              videoAsset.play();
            });
          }
        }
      }

      function triggerVocalSpeakerSystem() {
        if (audioAsset) {
          audioAsset.currentTime = 0;
          audioAsset.play().catch(e => console.log(e));
        }
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); 
          const utterance = new SpeechSynthesisUtterance('a car');
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        }
      }
    </script>
  </head>
  
  <body>

    <div id="splash">
      <h1>🧸 Toy AR Lesson 🤖</h1>
      <p style="font-size: 18px; margin: 5px 0 15px 0;">Hold iPhone in Portrait, click below, then scan!</p>
      <button class="action-btn" onclick="startARClass()">Start AR Class</button>
    </div>

    <div id="uiOverlay">
      <div class="vocabulary-row">
        <h1 class="vocabulary-text">a car</h1>
        <button class="speaker-icon-btn" onclick="triggerVocalSpeakerSystem()">🔊</button>
      </div>

      <div class="video-box-container">
        <button id="videoPlayOverlayBtn" onclick="triggerVideoPlayback()">▶️</button>
        <video id="carVideoElement" src="car.mp4" loop playsinline webkit-playsinline muted autoplay></video>
      </div>

      <p style="color: #fff; font-size: 14px; opacity: 0.8; margin: 0; font-weight: bold;">Move camera away to look at another toy</p>
    </div>

    <audio id="carAudioElement" src="car_sound.mp3" preload="auto" crossorigin="anonymous"></audio>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-marker preset="hiro" marker-handler></a-marker>
      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
