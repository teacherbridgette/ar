<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Teacher Wynn's Class</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
      #splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #2b3a42; color: white;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 99999; font-family: 'Comic Sans MS', sans-serif; text-align: center;
      }
      button {
        padding: 15px 35px; font-size: 22px; font-weight: bold;
        background-color: #ff5722; border: none; color: white;
        border-radius: 12px; cursor: pointer; margin-top: 20px;
        box-shadow: 0px 6px 0px #b33611;
      }
      button:active { transform: translateY(3px); box-shadow: 0px 3px 0px #b33611; }

      /* Floating Sound Button Overlay */
      #audioControl {
        display: none; 
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(255, 235, 59, 0.95);
        border: 4px solid #fff;
        border-radius: 50%;
        width: 85px;
        height: 85px;
        font-size: 42px;
        cursor: pointer;
        box-shadow: 0px 6px 12px rgba(0,0,0,0.35);
        align-items: center;
        justify-content: center;
      }
    </style>

    <script>
      // Global reference for video element
      let carVidElement = null;

      function startARClass() {
        document.getElementById('splash').style.display = 'none';

        // FORCE HARD BOOT: Force-play the video muted on this initial user gesture!
        carVidElement = document.querySelector('#carVideo');
        if (carVidElement) {
          carVidElement.load();
          // Playing and pausing quickly tricks the browser's hardware decoder into unlocking
          carVidElement.play().then(() => {
            carVidElement.pause();
            carVidElement.currentTime = 0;
          }).catch(err => console.log("Video gesture unlock failed:", err));
        }
      }

      function targetFoundAction() {
        if (carVidElement) {
          carVidElement.muted = true;
          carVidElement.currentTime = 0;
          
          // Execute play request
          const playPromise = carVidElement.play();
          if (playPromise !== undefined) {
            playPromise.catch(() => {
              // Forced loop backup for strict iOS environments
              carVidElement.muted = true;
              carVidElement.play();
            });
          }
        }
        document.getElementById('audioControl').style.display = 'flex';
      }

      function targetLostAction() {
        if (carVidElement) {
          carVidElement.pause();
        }
        document.getElementById('audioControl').style.display = 'none';
      }

      function playCarSound() {
        const audioEntity = document.querySelector('#soundCar');
        if (audioEntity && audioEntity.components && audioEntity.components.sound) {
          audioEntity.components.sound.playSound();
        }
      }

      // Explicit target tracking component registry
      AFRAME.registerComponent('handler-car', { 
        init: function () {
          this.el.addEventListener('targetFound', () => targetFoundAction());
          this.el.addEventListener('targetLost', () => targetLostAction());
        }
      });
    </script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="splash">
      <h1>🧸 Toy AR Lesson 🤖</h1>
      <p style="font-size: 18px;">Click below, then scan the car picture!</p>
      <button onclick="startARClass()">Start AR Class</button>
    </div>

    <button id="audioControl" onclick="playCarSound()">🔊</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: yes; uiScanning: yes; uiError: yes;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <audio id="carSoundAsset" src="car_sound.mp3" preload="auto" crossorigin="anonymous"></audio>
        
        <video id="carVideo" 
               src="car.mp4" 
               preload="auto" 
               loop="true" 
               crossorigin="anonymous" 
               playsinline 
               webkit-playsinline 
               muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 1" handler-car>
        
        <a-text id="textCar" value="a car" align="center" color="#FFEB3B" font="kelsonsans" position="0 0.4 0.2" scale="1.4 1.4 1.4" look-at="[a-camera]"></a-text>
        
        <a-entity geometry="primitive: plane; width: 1; height: 1" 
                  material="shader: chromakey; src: #carVideo; color: 0.0 1.0 0.0"
                  position="0 0 0.1"
                  rotation="0 0 0">
        </a-entity>

      </a-entity>

      <a-entity id="soundCar" sound="src: #carSoundAsset; poolSize: 2"></a-entity>

    </a-scene>
  </body>
</html>
