<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Toy Vocabulary AR Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: 'SF Pro Text', -apple-system, sans-serif;
        background-color: #000;
      }

      /* CRITICAL IPHONE FIX: Forces the AR viewport engine to stack correctly behind the UI */
      .mindar-ui-loading, .mindar-ui-scanning, a-scene, canvas {
        z-index: 1 !important;
        position: absolute;
      }

      #splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #2b3a42; color: white;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 99999; text-align: center; padding: 20px; box-sizing: border-box;
      }
      
      .action-btn {
        padding: 16px 36px; font-size: 22px; font-weight: bold;
        background-color: #ff5722; border: none; color: white;
        border-radius: 16px; cursor: pointer; margin-top: 20px;
        box-shadow: 0px 6px 0px #b33611;
      }

      /* Fullscreen Portrait Card Panel - Forced to the very top layer via z-index */
      #uiOverlay {
        display: none; /* Stays hidden until image is scanned */
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 9999 !important; /* Higher than A-Frame canvas */
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        background: rgba(43, 58, 66, 0.85); /* Dark translucent overlay */
        padding: 40px 20px 60px 20px;
        box-sizing: border-box;
      }

      .vocabulary-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
      }

      .vocabulary-text {
        font-size: 3.5rem;
        font-weight: 900;
        color: #FFEB3B;
        margin: 0;
        text-shadow: 0px 4px 8px rgba(0,0,0,0.6);
      }

      .speaker-icon-btn {
        background: #fff;
        border: none;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        font-size: 36px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.4);
      }

      .video-box-container {
        width: 85%;
        max-width: 320px;
        aspect-ratio: 1 / 1;
        background: #111;
        border: 6px solid #fff;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0px 16px 36px rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #carVideoElement {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }

      #videoPlayOverlayBtn {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        border: none;
        color: white;
        font-size: 65px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>

    <script>
      let audioAsset = null;
      let videoAsset = null;

      function startARClass() {
        document.getElementById('splash').style.display = 'none';

        // Pre-warm audio and video structures directly on first touch
        audioAsset = document.getElementById('carAudioElement');
        videoAsset = document.getElementById('carVideoElement');
        
        if (audioAsset) { audioAsset.load(); }
        if (videoAsset) { videoAsset.load(); }
        
        if ('speechSynthesis' in window) {
          const warmUpSpeech = new SpeechSynthesisUtterance('');
          window.speechSynthesis.speak(warmUpSpeech);
        }
      }

      function targetFoundAction() {
        document.getElementById('uiOverlay').style.display = 'flex';
      }

      function targetLostAction() {
        document.getElementById('uiOverlay').style.display = 'none';
        
        if (videoAsset) {
          videoAsset.pause();
          videoAsset.style.display = 'none';
          document.getElementById('videoPlayOverlayBtn').style.display = 'flex';
        }
        if (audioAsset) {
          audioAsset.pause();
        }
      }

      // Action: Play and Loop the MP4 Video
      function triggerVideoPlayback() {
        if (videoAsset) {
          document.getElementById('videoPlayOverlayBtn').style.display = 'none';
          videoAsset.style.display = 'block';
          videoAsset.currentTime = 0;
          videoAsset.play().catch(e => console.log("Video setup stalled:", e));
        }
      }

      // Action: Play local MP3 track + Text-To-Speech simultaneously
      function triggerVocalSpeakerSystem() {
        if (audioAsset) {
          audioAsset.currentTime = 0;
          audioAsset.play().catch(e => console.log("Audio file blocked:", e));
        }

        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); 
          const utterance = new SpeechSynthesisUtterance('a car');
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        }
      }

      AFRAME.registerComponent('handler-car', { 
        init: function () {
          this.el.addEventListener('targetFound', () => targetFoundAction());
          this.el.addEventListener('targetLost', () => targetLostAction());
        }
      });
    </script>
  </head>
  
  <body>
    
    <div id="splash">
      <h1>🧸 Toy AR Lesson 🤖</h1>
      <p style="font-size: 18px; margin: 5px 0 15px 0;">Hold iPhone in Portrait, click below, then scan!</p>
      <button class="action-btn" onclick="startARClass()">Start AR Class</button>
    </div>

    <div id="uiOverlay">
      
      <div class="vocabulary-row">
        <h1 class="vocabulary-text">a car</h1>
        <button class="speaker-icon-btn" onclick="triggerVocalSpeakerSystem()">🔊</button>
      </div>

      <div class="video-box-container">
        <button id="videoPlayOverlayBtn" onclick="triggerVideoPlayback()">▶️</button>
        <video id="carVideoElement" src="car.mp4" loop playsinline webkit-playsinline></video>
      </div>

      <p style="color: #fff; font-size: 14px; opacity: 0.7; margin: 0; font-weight: bold;">Move camera away to clear screen</p>
    </div>

    <audio id="carAudioElement" src="car_sound.mp3" preload="auto" crossorigin="anonymous"></audio>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: yes; uiScanning: yes; uiError: yes;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 1" handler-car></a-entity>
    </a-scene>

  </body>
</html>
