<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Simple Toy AR Lesson</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-text-geometry-component@0.5.1/dist/aframe-text-geometry-component.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
      #splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #2b3a42; color: white;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 99999; font-family: sans-serif; text-align: center;
      }
      button {
        padding: 15px 35px; font-size: 22px; font-weight: bold;
        background-color: #ff5722; border: none; color: white;
        border-radius: 12px; cursor: pointer; margin-top: 20px;
        box-shadow: 0px 6px 0px #b33611;
      }
      button:active { transform: translateY(3px); box-shadow: 0px 3px 0px #b33611; }
    </style>

    <script>
      // Component tracking logic registered cleanly BEFORE the HTML bodies load
      AFRAME.registerComponent('handler-robot', { init: function () {
        this.el.addEventListener('targetFound', () => {
          const video = document.querySelector('#robotVideo');
          if (video) video.play();
          const sound = document.querySelector('#soundChime');
          if (sound && sound.components.sound) sound.components.sound.playSound();
        });
        this.el.addEventListener('targetLost', () => {
          const video = document.querySelector('#robotVideo');
          if (video) video.pause();
        });
      }});

      AFRAME.registerComponent('handler-car', { init: function () {
        this.el.addEventListener('targetFound', () => {
          const video = document.querySelector('#carVideo');
          if (video) video.play();
          const sound = document.querySelector('#soundCar');
          if (sound && sound.components.sound) sound.components.sound.playSound();
        });
        this.el.addEventListener('targetLost', () => {
          const video = document.querySelector('#carVideo');
          if (video) video.pause();
        });
      }});

      AFRAME.registerComponent('handler-yoyo', { init: function () {
        this.el.addEventListener('targetFound', () => {
          const video = document.querySelector('#yoyoVideo');
          if (video) video.play();
          const sound = document.querySelector('#soundChime');
          if (sound && sound.components.sound) sound.components.sound.playSound();
        });
        this.el.addEventListener('targetLost', () => {
          const video = document.querySelector('#yoyoVideo');
          if (video) video.pause();
        });
      }});

      AFRAME.registerComponent('handler-doll', { init: function () {
        this.el.addEventListener('targetFound', () => {
          const video = document.querySelector('#dollVideo');
          if (video) video.play();
          const sound = document.querySelector('#soundChime');
          if (sound && sound.components.sound) sound.components.sound.playSound();
        });
        this.el.addEventListener('targetLost', () => {
          const video = document.querySelector('#dollVideo');
          if (video) video.pause();
        });
      }});

      // Function to explicitly prompt browser camera permissions on click
      async function startARClass() {
        try {
          // Explicitly demand device camera permission stream from the system
          await navigator.mediaDevices.getUserMedia({ video: true });
          document.getElementById('splash').style.display = 'none';
        } catch (err) {
          alert("Camera access was blocked or denied! Please enable camera access in your browser settings.");
          console.error("Camera access error:", err);
        }
      }
    </script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="splash">
      <h1>🧸 Toy AR Lesson 🤖</h1>
      <p style="font-size: 18px;">Grant camera access to begin!</p>
      <button onclick="startARClass()">Start AR Class</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="optimerBold" src="https://rawgit.com/mrdoob/three.js/dev/examples/fonts/optimer_bold.typeface.json"></a-asset-item>
        
        <audio id="magicChime" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg" preload="auto"></audio>
        <audio id="carSoundAsset" src="./car_sound.mp3" preload="auto"></audio>
        
        <video id="robotVideo" src="./robot.mp4" response-type="arraybuffer" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="carVideo" src="./car.mp4" response-type="arraybuffer" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="yoyoVideo" src="./yoyo.mp4" response-type="arraybuffer" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <video id="dollVideo" src="./doll.mp4" response-type="arraybuffer" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" handler-robot>
        <a-entity text-geometry="value: robot; font: #optimerBold; size: 0.18; height: 0.04;" material="color: #00BCD4;" position="-0.25 0.6 0.1" look-at="[a-camera]"></a-entity>
        <a-video src="#robotVideo" width="1" height="1" position="0 0 0.1" rotation="90 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1" handler-car>
        <a-entity text-geometry="value: car; font: #optimerBold; size: 0.18; height: 0.04;" material="color: #FFEB3B;" position="-0.15 0.6 0.1" look-at="[a-camera]"></a-entity>
        <a-video src="#carVideo" width="1" height="1" position="0 0 0.1" rotation="90 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2" handler-yoyo>
        <a-entity text-geometry="value: yo-yo; font: #optimerBold; size: 0.18; height: 0.04;" material="color: #4CAF50;" position="-0.25 0.6 0.1" look-at="[a-camera]"></a-entity>
        <a-video src="#yoyoVideo" width="1" height="1" position="0 0 0.1" rotation="90 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3" handler-doll>
        <a-entity text-geometry="value: doll; font: #optimerBold; size: 0.18; height: 0.04;" material="color: #E91E63;" position="-0.15 0.6 0.1" look-at="[a-camera]"></a-entity>
        <a-video src="#dollVideo" width="1" height="1" position="0 0 0.1" rotation="90 0 0"></a-video>
      </a-entity>

      <a-entity id="soundChime" sound="src: #magicChime; poolSize: 4"></a-entity>
      <a-entity id="soundCar" sound="src: #carSoundAsset; poolSize: 2"></a-entity>

    </a-scene>
  </body>
</html>
