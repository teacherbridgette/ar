<!DOCTYPE html>
<html>
  <head>
    <title>Classroom AR: Flat 2D Car Experience</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">

    <style>
      #textCanvas {
        display: none;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">

    <canvas id="textCanvas" width="512" height="128"></canvas>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="carGif" src="./car.gif" crossorigin="anonymous">
        <audio id="carSound" src="./car_sound.mp3" crossorigin="anonymous"></audio>
        <img id="speakerIcon" src="https://img.icons8.com/ios-filled/100/ffffff/speaker.png" crossorigin="anonymous">
      </a-assets>
      
      <a-marker preset="hiro" id="hiroMarker">
        
        <a-plane position="0 0.5 0" 
                 rotation="0 0 0" 
                 width="1.8" 
                 height="1.0"
                 src="#carGif" 
                 material="side: double; transparent: true;">
        </a-plane>

        <a-plane id="canvasTextPlane" 
                 position="0 1.1 0" 
                 width="1.2" 
                 height="0.3" 
                 material="transparent: true; opacity: 1;">
        </a-plane>

        <a-image src="#speakerIcon" 
                 position="0 0.01 1.0" 
                 rotation="-90 0 0" 
                 width="0.3" 
                 height="0.3"
                 sound="src: #carSound; autoplay: false; loop: true; volume: 1;">
        </a-image>
        
      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>

    <script>
      const soundEl = document.querySelector('[sound]');

      // --- FREDOKA 2D TEXT GENERATOR ---
      function generateFredokaText() {
        const canvas = document.getElementById('textCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dark background bar for readability
        ctx.fillStyle = "rgba(51, 51, 51, 0.8)";
        ctx.roundRect(64, 14, 384, 100, 20);
        ctx.fill();

        // Font settings
        ctx.font = "600 56px 'Fredoka', sans-serif";
        ctx.fillStyle = "#FFFFFF";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        ctx.fillText("car", canvas.width / 2, canvas.height / 2);

        const textPlane = document.getElementById('canvasTextPlane');
        textPlane.setAttribute('src', canvas);
      }

      // Wait for font download before rendering
      document.fonts.ready.then(() => {
        setTimeout(generateFredokaText, 500);
      });

      // Tap screen anywhere to start the engine audio loop
      window.addEventListener('click', () => {
        if (soundEl && soundEl.components.sound) {
          if (!soundEl.components.sound.isPlaying) {
            soundEl.components.sound.playSound();
          }
        }
      });
    </script>
  </body>
</html>
