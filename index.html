<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR.js Reliable Image Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
      #splash {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a1a1a; color: white;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 99999; font-family: 'Comic Sans MS', sans-serif; text-align: center;
      }
      button {
        padding: 16px 32px; font-size: 20px; font-weight: bold;
        background-color: #4CAF50; border: none; color: white;
        border-radius: 8px; cursor: pointer; margin-top: 20px;
      }
      /* AR.js custom video overlay styling to prevent white outs */
      .arjs-loader {
        height: 100%; width: 100%; position: absolute; top: 0; left: 0;
        background-color: rgba(0, 0, 0, 0.7); z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; font-size: 18px;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <div id="splash">
      <h1>🦖 Dinosaur AR Lesson 🦖</h1>
      <p>Click below to start, then wait for the asset loading message.</p>
      <button onclick="startAR()">Start AR</button>
    </div>

    <div class="arjs-loader" id="loader" style="display: none;">
      <div>Loading AR Engine Data... Please wait...</div>
    </div>

    <script>
      let sequenceTriggered = false;

      function startAR() {
        // Hide initial interaction screen, show system data loader
        document.getElementById('splash').style.display = 'none';
        document.getElementById('loader').style.display = 'flex';
        
        // Unlock native Speech Synthesis
        const unlock = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(unlock);
      }

      // Logic component attached to the image tracking target
      AFRAME.registerComponent('nft-handler', {
        init: function () {
          // Hide loading screen once the background image data is fully parsed
          this.el.sceneEl.addEventListener('renderstart', () => {
             document.getElementById('loader').style.display = 'none';
          });

          this.el.addEventListener('hasNFTData', () => {
             document.getElementById('loader').style.display = 'none';
          });

          // Trigger vocabulary actions when the picture comes into frame
          this.el.addEventListener('markerFound', () => {
            if (!sequenceTriggered) {
              sequenceTriggered = true;
              runDinoLesson();
            }
          });
        }
      });

      function runDinoLesson() {
        const textEntity = document.querySelector('#dinoText');
        const audioEntity = document.querySelector('#chimeSound');

        // 1. Say "dinosaur" immediately
        speak("dinosaur");

        // 2. At 2 seconds: Move up, change string, say "This is a dinosaur."
        setTimeout(() => {
          textEntity.setAttribute('value', 'This is a dinosaur.');
          textEntity.setAttribute('animation__move', {
            property: 'position',
            to: '0 150 -100',
            dur: 2000,
            easing: 'easeInOutQuad'
          });
          speak("This is a dinosaur.");
        }, 2000);

        // 3. At 4.5 seconds: Play the sound effect
        setTimeout(() => {
          if (audioEntity && audioEntity.components.sound) {
            audioEntity.components.sound.playSound();
          }
        }, 4500);

        // 4. At 7 seconds: Count "1 dinosaur, 2 dinosaurs."
        setTimeout(() => {
          textEntity.setAttribute('value', '1 dinosaur, 2 dinosaurs.');
          speak("1 dinosaur, 2 dinosaurs.");
        }, 7000);
      }

      function speak(phrase) {
        if ('speechSynthesis' in window) {
          const utterance = new SpeechSynthesisUtterance(phrase);
          utterance.rate = 0.85; 
          window.speechSynthesis.speak(utterance);
        }
      }
    </script>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <audio id="magic" src="https://actions.google.com/sounds/v1/cartoon/magic_chime.ogg" preload="auto"></audio>
      </a-assets>

      <a-nft
        nft-handler
        type="nft"
        url="https://raw.githack.com/AR-js-org/AR.js/master/data/dataNFT/pinball"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5">
          
          <a-text
            id="dinoText"
            value="dinosaur"
            align="center"
            color="#FF5722"
            font="kelsonsans"
            position="0 0 -50"
            scale="100 100 100"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
          </a-text>

      </a-nft>

      <a-entity id="chimeSound" sound="src: #magic; poolSize: 1"></a-entity>
      <a-entity camera></a-entity>

    </a-scene>
  </body>
</html>
