<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toy Vocabulary Lesson</title>
  <style>
    body {
      background-color: #2b3a42;
      color: white;
      font-family: 'Comic Sans MS', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    #displayArea {
      display: none;
      text-align: center;
    }
    h1 {
      color: #FFEB3B;
      font-size: 3rem;
      margin-bottom: 15px;
    }
    video {
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0px 8px 24px rgba(0,0,0,0.4);
    }
    button {
      padding: 15px 35px;
      font-size: 22px;
      font-weight: bold;
      background-color: #ff5722;
      border: none;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0px 6px 0px #b33611;
    }
    button:active {
      transform: translateY(3px);
      box-shadow: 0px 3px 0px #b33611;
    }
  </style>
</head>
<body>

  <button id="startBtn" onclick="triggerMedia()">Discover Toy</button>

  <div id="displayArea">
    <h1>a car</h1>
    
    <video id="toyVideo" loop playsinline muted crossorigin="anonymous">
      <source src="./car.mp4" type="video/mp4">
    </video>
    
    <audio id="toyAudio" crossorigin="anonymous">
      <source src="./car_sound.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    function triggerMedia() {
      // Hide button and reveal content
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('displayArea').style.display = 'block';

      const video = document.getElementById('toyVideo');
      const audio = document.getElementById('toyAudio');

      // Sync the play states immediately
      video.play().catch(err => console.error("Video failed:", err));
      audio.play().catch(err => console.error("Audio failed:", err));
    }
  </script>

</body>
</html>
