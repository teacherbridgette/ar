<!DOCTYPE html>
<html>
  <head>
    <title>Classroom AR: GIF Car Experience</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="carGif" src="./car.gif" crossorigin="anonymous">
        <audio id="carSound" src="./car_sound.mp3" crossorigin="anonymous"></audio>
        <img id="speakerIcon" src="https://img.icons8.com/ios-filled/100/ffffff/speaker.png" crossorigin="anonymous">
      </a-assets>
      
      <a-marker preset="hiro" id="hiroMarker">
        
        <a-entity id="static3DCar" position="0 0.5 0">
          
          <a-plane position="0 0 0" rotation="0 0 0" width="1.8" height="1.0"
                   src="#carGif" material="side: double; transparent: true;">
          </a-plane>

          <a-plane position="0 0 0" rotation="0 90 0" width="1.8" height="1.0"
                   src="#carGif" material="side: double; transparent: true;">
          </a-plane>

          <a-text value="car" 
                  position="0 0.8 0" 
                  align="center" 
                  color="#FFFFFF" 
                  width="6"
                  geometry="primitive: plane; width: 0.8; height: 0.3" 
                  material="color: #333333; opacity: 0.8">
          </a-text>

        </a-entity>

        <a-image src="#speakerIcon" 
                 position="0 0.01 1.0" 
                 rotation="-90 0 0" 
                 width="0.3" 
                 height="0.3"
                 sound="src: #carSound; autoplay: false; loop: true; volume: 1;">
        </a-image>
        
      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>

    <script>
      const soundEl = document.querySelector('[sound]');

      // Audio bypass: The moment a student taps anywhere on the screen, the car engine sound will start playing.
      window.addEventListener('click', () => {
        if (soundEl && soundEl.components.sound) {
          // Check if it's already playing so we don't restart it on multiple taps
          if (!soundEl.components.sound.isPlaying) {
            soundEl.components.sound.playSound();
            console.log("Audio started via screen tap!");
          }
        }
      });
    </script>
  </body>
</html>
