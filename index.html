<!DOCTYPE html>
<html>
  <head>
    <title>Classroom AR: Fixed 3D Car Experience</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-chromakey-material/dist/aframe-chromakey-material.min.js"></script>
    
    <style>
      .action-btn {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        padding: 15px 30px;
        background-color: #2196F3;
        color: white;
        border: none;
        border-radius: 25px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        font-family: sans-serif;
      }
    </style>
  </head>
  
  <body style="margin: 0px; overflow: hidden;">
    
    <button class="action-btn" id="playButton">Tap to Start Engine 🚗</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <video id="carVideo" src="./car.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        <audio id="carSound" src="./car_sound.mp3" crossorigin="anonymous"></audio>
        <img id="speakerIcon" src="https://img.icons8.com/ios-filled/100/ffffff/speaker.png" crossorigin="anonymous">
      </a-assets>
      
      <a-marker preset="hiro">
        
        <a-entity id="rotatingCarStructure" position="0 0.5 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
          
          <a-plane position="0 0 0.5" rotation="0 0 0" width="1.6" height="1.0"
                   material="shader: chromakey; src: #carVideo; color: 0.1 0.9 0.1; distance: 0.4; side: double;">
          </a-plane>

          <a-plane position="0 0 -0.5" rotation="0 180 0" width="1.6" height="1.0"
                   material="shader: chromakey; src: #carVideo; color: 0.1 0.9 0.1; distance: 0.4; side: double;">
          </a-plane>

          <a-plane position="0.8 0 0" rotation="0 90 0" width="1.0" height="1.0"
                   material="shader: chromakey; src: #carVideo; color: 0.1 0.9 0.1; distance: 0.4; side: double;">
          </a-plane>

          <a-plane position="-0.8 0 0" rotation="0 -90 0" width="1.0" height="1.0"
                   material="shader: chromakey; src: #carVideo; color: 0.1 0.9 0.1; distance: 0.4; side: double;">
          </a-plane>

          <a-text value="a car" 
                  position="0 1.0 0" 
                  align="center" 
                  color="#FFFFFF" 
                  width="5"
                  geometry="primitive: plane; width: 1.2; height: 0.3" 
                  material="color: #333333; opacity: 0.8">
          </a-text>

        </a-entity>

        <a-image src="#speakerIcon" 
                 position="0 0.1 1.1" 
                 rotation="-90 0 0" 
                 width="0.3" 
                 height="0.3"
                 sound="src: #carSound; autoplay: false; loop: true; volume: 1;">
        </a-image>
        
      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>

    <script>
      const btn = document.getElementById('playButton');
      const video = document.getElementById('carVideo');
      const soundEl = document.querySelector('[sound]');

      window.addEventListener('load', () => {
        video.load();
      });

      btn.addEventListener('click', () => {
        // Enforce muted startup to satisfy hardware/OS rules
        video.muted = true; 
        
        video.play().then(() => {
          console.log("Video track engaged successfully.");
          // Unmute once playback is verified by browser context
          video.muted = false; 
        }).catch((e) => {
          console.warn("Fallback muted loop forced.", e);
          video.play(); 
        });
        
        // Engage audio element
        if (soundEl && soundEl.components.sound) {
          soundEl.components.sound.playSound();
        }
        
        btn.style.display = 'none';
      });
    </script>
  </body>
</html>
